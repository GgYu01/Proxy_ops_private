services:
  proxy-subscriptions:
    image: nginx:alpine
    container_name: infra_proxy_subscriptions
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
    networks:
      - infra_gateway_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=infra_gateway_net"
      - "traefik.http.routers.proxy-subscriptions.rule=Host(`proxy-subscriptions.svc.prod.lab.gglohh.top`)"
      - "traefik.http.routers.proxy-subscriptions.entrypoints=websecure"
      - "traefik.http.routers.proxy-subscriptions.tls=true"
      - "traefik.http.services.proxy-subscriptions.loadbalancer.server.port=80"

networks:
  infra_gateway_net:
    external: true
