rules:
# === HIGHEST PRIORITY CURSOR DOMAIN DIRECT PROTECTIONS ===
# Cursor domains are fuzzy-matched with DOMAIN-KEYWORD,cursor before process
# rules. This makes Cursor destinations direct no matter which app opens them,
# including apps with process-level PROXY overrides.
# === END HIGHEST PRIORITY CURSOR DOMAIN DIRECT PROTECTIONS ===
- DOMAIN-KEYWORD,cursor,DIRECT
- DOMAIN-SUFFIX,cursor.sh,DIRECT
- DOMAIN-SUFFIX,cursor.com,DIRECT
- DOMAIN-SUFFIX,cursorapi.com,DIRECT
- DOMAIN-SUFFIX,cursor-cdn.com,DIRECT
- DOMAIN-SUFFIX,anysphere.co,DIRECT
- DOMAIN-SUFFIX,anysphere.inc,DIRECT
# === WPS / KINGSOFT DOMAIN DIRECT PROTECTIONS ===
# WPS Office and Kingsoft domains are matched before process rules so WPS
# embedded WebView or helper subprocess traffic stays DIRECT even when the
# process name is shared with other apps.
# === END WPS / KINGSOFT DOMAIN DIRECT PROTECTIONS ===
- DOMAIN-KEYWORD,kingsoft,DIRECT
- DOMAIN-SUFFIX,kingsoft.com,DIRECT
- DOMAIN-SUFFIX,kingsoft-office-service.com,DIRECT
- DOMAIN-SUFFIX,wps.cn,DIRECT
- DOMAIN-SUFFIX,wpscdn.cn,DIRECT
- DOMAIN-SUFFIX,wpscdn.com,DIRECT
- DOMAIN-SUFFIX,kdocs.cn,DIRECT
- DOMAIN-SUFFIX,kdocs.com,DIRECT
- DOMAIN-SUFFIX,ksosoft.com,DIRECT
- DOMAIN-SUFFIX,ksord.com,DIRECT
- DOMAIN-SUFFIX,wpsplus.com,DIRECT
# === USER-EDITABLE PROCESS DIRECT PROTECTIONS ===
# This editable block contains DIRECT process protections.
# This profile is for users in mainland China: private, China, Apple China,
# Microsoft China, Google China, QQ/WeChat/Cursor/Edge Beta, WPS Office /
# cloud sync / update, and subscription update traffic stay DIRECT; non-mainland
# fallback traffic uses PROXY.
# To stop protecting one DIRECT process, comment out its line. Keep these
# process rules explicit and predictable.
- PROCESS-NAME,QQ.exe,DIRECT
- PROCESS-NAME,QQProtect.exe,DIRECT
- PROCESS-NAME,TIM.exe,DIRECT
- PROCESS-NAME,Cursor.exe,DIRECT
- PROCESS-NAME,cursor.exe,DIRECT
- PROCESS-NAME,cursor-agent.exe,DIRECT
- PROCESS-NAME,WeChat.exe,DIRECT
- PROCESS-NAME,WeChatAppEx.exe,DIRECT
- PROCESS-NAME,WeChatBrowser.exe,DIRECT
- PROCESS-NAME,WeChatOCR.exe,DIRECT
- PROCESS-NAME,Weixin.exe,DIRECT
- PROCESS-NAME,WXWork.exe,DIRECT
- PROCESS-NAME,wps.exe,DIRECT
- PROCESS-NAME,wpp.exe,DIRECT
- PROCESS-NAME,et.exe,DIRECT
- PROCESS-NAME,wpspdf.exe,DIRECT
- PROCESS-NAME,wpscloudsvr.exe,DIRECT
- PROCESS-NAME,ksolaunch.exe,DIRECT
- PROCESS-NAME,wpsupdate.exe,DIRECT
- PROCESS-NAME,ksomisc.exe,DIRECT
- PROCESS-NAME,QQ,DIRECT
- PROCESS-NAME,Cursor,DIRECT
- PROCESS-NAME,Cursor Helper,DIRECT
- PROCESS-NAME,Cursor Helper (GPU),DIRECT
- PROCESS-NAME,Cursor Helper (Plugin),DIRECT
- PROCESS-NAME,Cursor Helper (Renderer),DIRECT
- PROCESS-NAME,cursor-agent,DIRECT
- PROCESS-NAME,WeChat,DIRECT
- PROCESS-NAME,Weixin,DIRECT
- PROCESS-NAME,WXWork,DIRECT
- PROCESS-NAME,qq,DIRECT
- PROCESS-NAME,cursor,DIRECT
- PROCESS-NAME,wechat,DIRECT
- PROCESS-NAME,weixin,DIRECT
- PROCESS-NAME,wxwork,DIRECT
- PROCESS-PATH,C:\Program Files\Microsoft\Edge Beta\Application\msedge.exe,DIRECT
- PROCESS-PATH,C:\Program Files (x86)\Microsoft\Edge Beta\Application\msedge.exe,DIRECT
- PROCESS-PATH-WILDCARD,C:\Users\*\AppData\Local\Microsoft\Edge Beta\Application\msedge.exe,DIRECT
- PROCESS-PATH-WILDCARD,C:\Users\*\AppData\Local\Programs\Cursor\*,DIRECT
- PROCESS-PATH-WILDCARD,C:\Users\*\AppData\Local\Kingsoft\WPS Office\*,DIRECT
- PROCESS-PATH-WILDCARD,/Applications/Cursor.app/Contents/*,DIRECT
- PROCESS-PATH-WILDCARD,/usr/bin/cursor*,DIRECT
# === END USER-EDITABLE PROCESS DIRECT PROTECTIONS ===
# === USER-EDITABLE PROCESS PROXY OVERRIDES ===
# These narrow PROXY overrides target Simprint's Chrome profile browser plus
# selected AI/developer desktop app install paths: Antigravity, ChatGPT,
# ChatGPT Atlas, and Codex. They deliberately do not target shared runtimes
# such as msedgewebview2.exe, node, or python.
# Comment individual lines out to route that app by destination rules only.
- PROCESS-PATH-WILDCARD,C:\Users\*\AppData\Local\Simprint\data\profiles\Chrome *\chrome_proxy.exe,PROXY
- PROCESS-PATH-WILDCARD,C:\Users\*\AppData\Local\Simprint\data\profiles\Chrome *\simprint.exe,PROXY
- PROCESS-PATH-WILDCARD,C:\Program Files\Google\Antigravity\*,PROXY
- PROCESS-PATH-WILDCARD,C:\Program Files\Google\Antigravity*\*,PROXY
- PROCESS-PATH-WILDCARD,C:\Users\*\AppData\Local\Programs\Antigravity\*,PROXY
